name: CI

on:
  pull_request:
    branches: ["main", "dev"]
  push:
    branches: ["main"]

jobs:
  test:
    name: Build & Test
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ["1.24"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Verify dependencies
        run: go mod verify

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      # -race requires CGO + a 64-bit GCC toolchain.
      # GitHub's Windows runner ships a 32-bit MinGW GCC which cannot compile
      # the race runtime. Run the race detector only on Linux and macOS.
      - name: Test (with race detector)
        if: runner.os != 'Windows'
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Test (Windows — no race detector)
        if: runner.os == 'Windows'
        run: go test -v -coverprofile=coverage.out ./...

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.go == '1.24'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out
