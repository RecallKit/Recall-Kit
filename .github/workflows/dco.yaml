name: DCO

on:
  pull_request:
    branches: ["main", "dev"]

jobs:
  dco:
    name: DCO Sign-off Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so we can inspect all commits in the PR

      - name: Check DCO sign-off
        uses: tim-actions/dco@master