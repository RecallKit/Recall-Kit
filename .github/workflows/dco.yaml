name: DCO

on:
  pull_request:
    branches: ["main", "dev"]

jobs:
  dco:
    name: DCO Sign-off Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so we can inspect all commits in the PR

      - name: Check DCO sign-off
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}
          MISSING=0

          for commit in $(git log --format="%H" "$BASE".."$HEAD"); do
            MESSAGE=$(git log -1 --format="%B" "$commit")
            AUTHOR=$(git log -1 --format="%an <%ae>" "$commit")
            if ! echo "$MESSAGE" | grep -qE "^Signed-off-by: .+ <.+>$"; then
              echo "❌ Commit $commit by $AUTHOR is missing 'Signed-off-by' trailer"
              MISSING=1
            fi
          done

          if [ "$MISSING" -eq 1 ]; then
            echo ""
            echo "One or more commits are missing a DCO sign-off."
            echo "Add 'Signed-off-by: Your Name <your@email.com>' to your commit message,"
            echo "or use 'git commit -s' to sign off automatically."
            exit 1
          fi

          echo "✅ All commits are signed off."